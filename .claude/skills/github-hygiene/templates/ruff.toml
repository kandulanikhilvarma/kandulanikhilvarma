# Ruff lint configuration.
# Notebooks are exploratory: their common idioms (import-after-code, throwaway
# f-strings, re-imports) are ignored, while real defects — syntax errors,
# undefined names, unused code in .py modules — are still enforced.
target-version = "py310"
line-length = 100

[lint.per-file-ignores]
"*.ipynb" = ["E402", "E701", "E702", "F401", "F811", "F841", "F541"]
